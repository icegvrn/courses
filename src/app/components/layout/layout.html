<div class="app-shell">

  <!-- Header global (image) -->
  <header class="site-header">
    <!-- fond pleine largeur, agrandi, pas flouté -->
    <div class="site-header__bg">
      <img src="https://i.ibb.co/9k7B3CkT/header.png" alt="" aria-hidden="true" />
    </div>
    <!-- image cappée à 1344px avec fondu latéral -->
    <div class="site-header__inner">
      <img class="site-header__img" src="https://i.ibb.co/9k7B3CkT/header.png" alt="Mes Courses" />
    </div>
  </header>

  <!-- Corps : sidebar + contenu -->
  <div class="content-area">

    <!-- Sidebar (desktop) -->
    @if (!isMobile()) {
      <aside class="sidebar" [class.sidebar--collapsed]="sidebarCollapsed()">
        <div class="sidebar__top">
          <button class="sidebar__toggle btn btn--icon btn--ghost" (click)="toggleSidebar()" [attr.aria-label]="sidebarCollapsed() ? 'Ouvrir le menu' : 'Réduire le menu'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              @if (sidebarCollapsed()) {
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
              } @else {
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="15" y2="6"></line>
                <line x1="3" y1="18" x2="15" y2="18"></line>
              }
            </svg>
          </button>
        </div>

        <nav class="sidebar__nav" role="navigation">
          @for (item of navItems; track item.path) {
            <a class="nav-item"
               [routerLink]="item.path"
               routerLinkActive="nav-item--active"
               [title]="sidebarCollapsed() ? item.label : ''">
              <span class="nav-item__icon">{{ item.icon }}</span>
              @if (!sidebarCollapsed()) {
                <span class="nav-item__label">{{ item.label }}</span>
                @if (item.badge && item.badge() > 0) {
                  <span class="nav-item__badge badge badge--muted">{{ item.badge() }}</span>
                }
              }
            </a>
          }
        </nav>
      </aside>
    }

    <!-- Contenu principal -->
    <main class="main-content">
      <div class="page-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>

  <!-- Bottom nav (mobile) -->
  @if (isMobile()) {
    <nav class="bottom-nav" role="navigation" aria-label="Navigation principale">
      @for (item of navItems; track item.path) {
        <a class="bottom-nav__item"
           [routerLink]="item.path"
           routerLinkActive="bottom-nav__item--active">
          <span class="bottom-nav__icon">{{ item.icon }}</span>
          <span class="bottom-nav__label">{{ item.label }}</span>
        </a>
      }
    </nav>
  }

</div>

<app-toast></app-toast>
